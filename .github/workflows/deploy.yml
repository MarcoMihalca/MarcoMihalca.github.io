name: Deploy Public to Pages
on:
  push:
    branches: ["main"] # Change to "master" if that's your branch name

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public' # This tells GitHub to look inside /public
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4